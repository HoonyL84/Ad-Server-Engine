groups:
  - name: ad-serving
    rules:
      - alert: AdServingP99High
        expr: histogram_quantile(0.99, sum(rate(ad_serving_duration_seconds_bucket[5m])) by (le)) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Ad serving p99 latency is above 100ms
          description: p99 latency stayed above 100ms for more than 1 minute.

      - alert: AdDeliveredRateLow
        expr: |
          (
            sum(rate(ad_serving_delivered_total[5m]))
            /
            sum(rate(ad_serving_requests_total[5m]))
          ) < 0.99
          and sum(rate(ad_serving_requests_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Ad delivered rate is below 99%
          description: Ad delivery success rate stayed below 99% for more than 1 minute.

      - alert: CandidateTimeoutRateHigh
        expr: |
          (
            sum(rate(ad_serving_fallback_total{reason="CANDIDATE_TIMEOUT"}[5m]))
            /
            sum(rate(ad_serving_requests_total[5m]))
          ) > 0.01
          and sum(rate(ad_serving_requests_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Candidate timeout rate is above 1%
          description: Elasticsearch candidate lookup timeout ratio stayed above 1% for more than 1 minute.

      - alert: DmpTimeoutRateHigh
        expr: |
          (
            sum(rate(ad_serving_fallback_total{reason="DMP_TIMEOUT"}[5m]))
            /
            sum(rate(ad_serving_requests_total[5m]))
          ) > 0.01
          and sum(rate(ad_serving_requests_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: DMP timeout rate is above 1%
          description: DMP profile lookup timeout ratio stayed above 1% for more than 1 minute.

      - alert: AdServerTargetDown
        expr: up{job="ad-server-engine"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: Ad server Prometheus target is down
          description: Prometheus cannot scrape the ad server metrics endpoint.

      - alert: RedisTargetDown
        expr: up{job="redis"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: Redis exporter target is down
          description: Prometheus cannot scrape Redis exporter metrics.

      - alert: ElasticsearchTargetDown
        expr: up{job="elasticsearch"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: Elasticsearch exporter target is down
          description: Prometheus cannot scrape Elasticsearch exporter metrics.
