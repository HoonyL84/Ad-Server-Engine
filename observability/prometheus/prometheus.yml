global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: ad-server-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: elasticsearch
    static_configs:
      - targets:
          - elasticsearch-exporter:9114
