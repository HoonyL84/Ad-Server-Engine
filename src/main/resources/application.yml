spring:
  application:
    name: ad-server-engine

  sql:
    init:
      mode: never

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/ad_server?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 250 # local fail-fast baseline; tune with real workload metrics
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    defer-datasource-initialization: true

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 100ms
    socket-timeout: 150ms

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 100ms
      connect-timeout: 100ms

  kafka:
    bootstrap-servers: localhost:9092
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ad-server-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: io.hoony.adserver.domain.adevent.AdEventRequest
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer

ad-server:
  serving:
    dmp-timeout-ms: 30
    candidate-timeout-ms: 50
    candidate-cache-ttl-ms: 100
    cb:
      failure-threshold: 5
      backoff-window-ms: 10000
      backoff-jitter-ms: 2000
  dmp:
    provider: grpc
    grpc:
      host: localhost
      port: 9090
      mock:
        enabled: true
    failure-injection:
      enabled: false
      slow-delay-ms: 200

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"
  level:
    root: info
    io.hoony.adserver: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        ad.serving.duration: true
      percentiles:
        http.server.requests: 0.95,0.99
        ad.serving.duration: 0.95,0.99
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
